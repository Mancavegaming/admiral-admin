name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release contents
        run: |
          mkdir -p release/admiral-admin
          cp -r mod web docs cpp install.ps1 LICENSE README.md CHANGELOG.md release/admiral-admin/
          # Drop any locally-built DLL artefacts — those get attached separately
          rm -rf release/admiral-admin/cpp/dist

      - name: Create zip
        run: |
          cd release
          zip -r "../admiral-admin-${{ steps.version.outputs.version }}.zip" admiral-admin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: admiral-admin-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            AdmiralsPanel ${{ github.ref_name }}

            ## Install

            ```powershell
            # Download and extract admiral-admin-${{ steps.version.outputs.version }}.zip,
            # then from inside the extracted folder:
            powershell -ExecutionPolicy Bypass -File install.ps1
            ```

            See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for full setup.

            **Requires [WindrosePlus](https://github.com/HumanGenome/WindrosePlus) v1.0.7+ installed first.**
