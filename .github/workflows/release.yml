name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release contents
        run: |
          mkdir -p release/admiral-admin
          cp -r mod web docs cpp install.ps1 LICENSE README.md CHANGELOG.md release/admiral-admin/
          # Drop any locally-built DLL artefacts — those get attached separately
          rm -rf release/admiral-admin/cpp/dist

      - name: Create zip
        run: |
          cd release
          zip -r "../admiral-admin-${{ steps.version.outputs.version }}.zip" admiral-admin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: admiral-admin-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            AdmiralsPanel ${{ github.ref_name }}

            ## Install (standalone, default — no WindrosePlus needed)

            1. Download `admiral-admin-${{ steps.version.outputs.version }}.zip` and `main.dll` from the assets below.
            2. Extract the zip somewhere on the server.
            3. Drop `main.dll` at `cpp/dist/main.dll` inside the extracted folder.
            4. From the extracted folder:

               ```powershell
               powershell -ExecutionPolicy Bypass -File install.ps1
               ```

            5. Restart the server and open <http://localhost:8790/>.

            **Requires [UE4SS](https://github.com/UE4SS-RE/RE-UE4SS/releases/latest)** installed at `R5/Binaries/Win64/ue4ss/`. The installer fails with a friendly link if it's missing.

            See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) and [docs/install.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/install.md) for full setup, troubleshooting, and the legacy WindrosePlus sub-mod option.
